AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Stock Paper Trading Bot - Lambda + EventBridge scheduled triggers

Globals:
  Function:
    Runtime: python3.12
    Timeout: 300
    MemorySize: 512
    Environment:
      Variables:
        TRADES_BUCKET: !Ref TradesBucket

Resources:
  TradesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "stock-trades-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled

  TradingFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub "${TradesBucket.Arn}/*"

  MorningBuyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: stock-morning-buy
      Handler: lambda/handler.morning_buy
      CodeUri: ../
      Role: !GetAtt TradingFunctionRole.Arn
      Events:
        MorningSchedule:
          Type: Schedule
          Properties:
            Schedule: cron(35 13 ? * MON-FRI *)
            Description: "9:35 AM ET (market open + 5min) Mon-Fri"
            Enabled: true

  AfternoonCloseFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: stock-afternoon-close
      Handler: lambda/handler.afternoon_close
      CodeUri: ../
      Role: !GetAtt TradingFunctionRole.Arn
      Events:
        AfternoonSchedule:
          Type: Schedule
          Properties:
            Schedule: cron(5 20 ? * MON-FRI *)
            Description: "4:05 PM ET (market close + 5min) Mon-Fri"
            Enabled: true

  LearnFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: stock-learn
      Handler: lambda/handler.learn
      CodeUri: ../
      Role: !GetAtt TradingFunctionRole.Arn
      Events:
        LearnSchedule:
          Type: Schedule
          Properties:
            Schedule: cron(30 20 ? * MON-FRI *)
            Description: "4:30 PM ET (after close) Mon-Fri"
            Enabled: true

Outputs:
  TradesBucketName:
    Value: !Ref TradesBucket
  MorningBuyArn:
    Value: !GetAtt MorningBuyFunction.Arn
  AfternoonCloseArn:
    Value: !GetAtt AfternoonCloseFunction.Arn
  LearnArn:
    Value: !GetAtt LearnFunction.Arn
